{% extends 'base.html' %}{% block content %}<div class="card"><h1 class="hero-title">จัดการ User เฉพาะ Admin</h1><form method="post" class="grid"><div><label>Username</label><input name="username" required></div><div><label>Password</label><input name="password" required></div><div><label>Role</label><select name="role"><option value="user">user</option><option value="admin">admin</option></select></div><div style="align-self:end"><button class="btn">สร้าง User</button></div></form></div><div class="card table-wrap"><table><tr><th>Username</th><th>Role</th><th>สร้างเมื่อ</th><th>จัดการ</th></tr>{% for u in users %}<tr><td>{{u.username}}</td><td>{{u.role}}</td><td>{{u.created_at}}</td><td><form method="post" action="{{url_for('del_user',uid=u.id)}}" onsubmit="return confirm('ลบ user นี้?')"><button class="btn red">ลบ</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
